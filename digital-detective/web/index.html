<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Detective // OSINT Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Orbitron:wght@400;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="overlay"></div>
    <div class="scanline"></div>

    <div class="container">
        <header>
            <h1 class="glitch" data-text="DIGITAL_DETECTIVE">DIGITAL_DETECTIVE</h1>
            <div class="status-bar">
                <span class="status-item">SYSTEM: <span class="online">ONLINE</span></span>
                <span class="status-item">VERSION: 2.0.0</span>
                <span class="status-item">MODE: <span class="hunting">HUNTING</span></span>
            </div>
        </header>

        <main>
            <div class="control-panel glass">
                <div class="tabs">
                    <button class="tab-btn active" onclick="switchTab('username')">USERNAME</button>
                    <button class="tab-btn" onclick="switchTab('name')">FULL NAME</button>
                    <button class="tab-btn" onclick="switchTab('ip')">IP ADDR</button>
                    <button class="tab-btn" onclick="switchTab('email')">EMAIL</button>
                    <button class="tab-btn" onclick="switchTab('dating')">DATING</button>
                </div>

                <div class="input-area">
                    <div id="username-form" class="form-group active">
                        <label>TARGET_HANDLE:</label>
                        <input type="text" id="username-input" placeholder="e.g. denalaiho"
                            onkeypress="handleEnter(event)">
                    </div>
                    <div id="name-form" class="form-group">
                        <label>TARGET_NAME:</label>
                        <input type="text" id="name-input" placeholder="e.g. Christian Sandin"
                            onkeypress="handleEnter(event)">
                    </div>
                    <div id="ip-form" class="form-group">
                        <label>TARGET_IP:</label>
                        <input type="text" id="ip-input" placeholder="e.g. 8.8.8.8" onkeypress="handleEnter(event)">
                    </div>
                    <div id="email-form" class="form-group">
                        <label>TARGET_EMAIL:</label>
                        <input type="text" id="email-input" placeholder="e.g. test@example.com"
                            onkeypress="handleEnter(event)">
                    </div>
                    <div id="dating-form" class="form-group">
                        <label>TARGET_USERNAME:</label>
                        <input type="text" id="dating-input" placeholder="e.g. denalaiho"
                            onkeypress="handleEnter(event)">
                    </div>
                    <button id="search-btn" onclick="performSearch()">INITIATE_SCAN</button>
                </div>
            </div>

            <div class="output-panel glass">
                <div class="output-header">
                    <span>TERMINAL_OUTPUT</span>
                    <div class="window-controls">
                        <span class="dot red"></span>
                        <span class="dot yellow"></span>
                        <span class="dot green"></span>
                    </div>
                </div>
                <div class="terminal-window" id="terminal-content">
                    <span class="comment">// WAITING FOR INPUT...</span>
                    <span class="cursor">_</span>
                </div>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>

</html>
